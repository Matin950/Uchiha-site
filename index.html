<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uchiha Site</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma,sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100vh;
background:linear-gradient(135deg,#000,#180000,#000);
}

.page{
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
padding:20px;
}

.active{
display:flex;
}

.card{
width:380px;
max-width:95%;
background:#111;
padding:25px;
border-radius:20px;
border:2px solid #ff0000;
box-shadow:0 0 25px red;
text-align:center;
}

.logo{
width:160px;
margin-bottom:15px;
animation:spin 10s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

h1,h2{
margin-bottom:15px;
color:#ff4444;
}

input{
width:100%;
padding:12px;
margin:8px 0;
background:#1a1a1a;
border:1px solid #ff3333;
border-radius:10px;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:red;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.link-btn{
background:#222;
}

.power{
background:#1a1a1a;
padding:12px;
margin:8px 0;
border-radius:10px;
border-right:4px solid red;
}

.msg{
margin-top:10px;
font-weight:bold;
}

.welcome{
font-size:24px;
margin-bottom:20px;
}
</style></head><body><!-- صفحه اصلی --><div class="page active" id="homePage">
<div class="card"><img src="sharingan.png" class="logo"><h1>خاندان اوچیها</h1><button onclick="showPage('loginPage')">ورود</button>

<button class="link-btn" onclick="showPage('registerPage')">
ثبت نام
</button></div>
</div><!-- ثبت نام --><div class="page" id="registerPage">
<div class="card"><h2>ثبت نام</h2><input id="regUser" placeholder="نام کاربری"><input id="regEmail" type="email" placeholder="ایمیل"><input id="regPass" type="password" placeholder="رمز عبور"><input id="regPass2" type="password" placeholder="تکرار رمز عبور"><button onclick="registerUser()">ثبت نام</button>

<button class="link-btn" onclick="showPage('homePage')">
بازگشت
</button><p id="registerMsg" class="msg"></p></div>
</div><!-- ورود --><div class="page" id="loginPage">
<div class="card"><h2>ورود</h2><input id="loginUser" placeholder="نام کاربری یا ایمیل"><input id="loginPass" type="password" placeholder="رمز عبور"><button onclick="loginUser()">ورود</button>

<button class="link-btn" onclick="showPage('homePage')">
بازگشت
</button><p id="loginMsg" class="msg"></p></div>
</div><!-- پنل اوچیها --><div class="page" id="panelPage">
<div class="card"><img src="sharingan.png" class="logo"><div class="welcome" id="welcomeText"></div><h2>قدرت های خاندان اوچیها</h2><div class="power">👁 Sharingan</div>
<div class="power">🔥 Mangekyō Sharingan</div>
<div class="power">🔥 Amaterasu</div>
<div class="power">🌙 Tsukuyomi</div>
<div class="power">🛡 Susanoo</div>
<div class="power">⚔ Izanagi</div>
<div class="power">♾ Izanami</div><button onclick="logout()">خروج</button>

</div>
</div><script>

function showPage(id){

document.querySelectorAll('.page').forEach(page=>{
page.classList.remove('active');
});

document.getElementById(id).classList.add('active');

}

function registerUser(){

let user=document.getElementById('regUser').value;
let email=document.getElementById('regEmail').value;
let pass=document.getElementById('regPass').value;
let pass2=document.getElementById('regPass2').value;

if(!user || !email || !pass || !pass2){

document.getElementById('registerMsg').innerHTML=
'همه فیلدها را کامل کن';

return;
}

if(pass !== pass2){

document.getElementById('registerMsg').innerHTML=
'رمزها یکسان نیستند';

return;
}

localStorage.setItem('uchiha_user',user);
localStorage.setItem('uchiha_email',email);
localStorage.setItem('uchiha_pass',pass);

alert('ثبت نام موفق بود');

showPage('homePage');

}

function loginUser(){

let login=document.getElementById('loginUser').value;
let pass=document.getElementById('loginPass').value;

let user=localStorage.getItem('uchiha_user');
let email=localStorage.getItem('uchiha_email');
let savedPass=localStorage.getItem('uchiha_pass');

if(
(login===user || login===email)
&& pass===savedPass
){

document.getElementById('welcomeText').innerHTML=
'خوش آمدی ' + user + ' 🔥';

showPage('panelPage');

}else{

document.getElementById('loginMsg').innerHTML=
'اطلاعات ورود اشتباه است';

}

}

function logout(){

showPage('homePage');

}

</script></body>
</html>
