<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uchiha Site</title><style>
body{
background:black;
color:white;
font-family:tahoma;
text-align:center;
padding:20px;
}

.box{
max-width:400px;
margin:auto;
background:#111;
padding:20px;
border-radius:15px;
border:2px solid red;
}

img{
width:180px;
}

input{
width:90%;
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
border-radius:8px;
margin:5px;
}

#home{
display:none;
}
</style></head>
<body><div id="login" class="box"><img src="sharingan.png"><h1>ورود به خاندان اوچیها</h1><input id="user" placeholder="نام کاربری"><input id="pass" type="password" placeholder="رمز عبور"><br><button onclick="registerUser()">ثبت نام</button>

<button onclick="loginUser()">ورود</button>

<p id="msg"></p></div><div id="home" class="box"><img src="sharingan.png"><h1 id="welcome"></h1><h2>قدرت های اوچیها</h2><p>👁️ Sharingan</p>
<p>🔥 Amaterasu</p>
<p>🌙 Tsukuyomi</p>
<p>🛡️ Susanoo</p>
<p>⚡ Mangekyo Sharingan</p><button onclick="logout()">خروج</button>

</div><script>

function registerUser(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

localStorage.setItem("user",u);
localStorage.setItem("pass",p);

document.getElementById("msg").innerHTML="ثبت نام موفق بود";
}

function loginUser(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(
u===localStorage.getItem("user")
&&
p===localStorage.getItem("pass")
){

document.getElementById("login").style.display="none";
document.getElementById("home").style.display="block";

document.getElementById("welcome").innerHTML=
"خوش آمدی " + u;

}else{

document.getElementById("msg").innerHTML=
"نام کاربری یا رمز اشتباه است";

}

}

function logout(){
location.reload();
}

</script></body>
</html>
